---
name: Release
on:
  workflow_run:
    workflows: ["Build, Push & Scan Container Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-go-release.yaml@main
    with:
      runs-on: ubuntu-latest
      stage-image: false
      push-kustomize: true
      kcl-source-dir: kcl
      kcl-profile-file: tests/kcl-deploy-profile.yaml
      kustomize-oci-repo: ghcr.io/stuttgart-things/clusterscope-kustomize
    secrets: inherit # pragma: allowlist secret

  stage-image:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect new release
        id: version
        run: |
          git fetch --tags
          VERSION=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "")
          TAG_COMMIT=$(git rev-list -n1 "$VERSION" 2>/dev/null || echo "")
          HEAD_COMMIT=$(git rev-parse HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [ "$TAG_COMMIT" = "$HEAD_COMMIT" ] && [ -n "$VERSION" ]; then
            echo "new_release=true" >> $GITHUB_OUTPUT
            echo "New release detected: $VERSION"
          else
            echo "new_release=false" >> $GITHUB_OUTPUT
            echo "No new release on HEAD"
          fi

      - name: Set up Ko
        if: steps.version.outputs.new_release == 'true'
        uses: ko-build/setup-ko@v0.9

      - name: Login to GHCR
        if: steps.version.outputs.new_release == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | ko login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push versioned image
        if: steps.version.outputs.new_release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ko build --bare --tags="${VERSION}" ./cmd/clusterscope \
            --platform=linux/amd64,linux/arm64
        env:
          KO_DOCKER_REPO: ghcr.io/${{ github.repository }}
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT: ${{ github.sha }}
