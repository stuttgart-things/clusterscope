kcl_options:
  - key: config.image
    value: ghcr.io/stuttgart-things/clusterscope:latest
  - key: config.namespace
    value: clusterscope
  - key: config.tech
    value: flux
  - key: config.dir
    value: /data/harvester/clusters
  - key: config.port
    value: "8080"
  - key: config.replicas
    value: "1"
  - key: config.gitSyncEnabled
    value: "true"
  - key: config.gitSyncRepo
    value: https://github.com/stuttgart-things/harvester
  - key: config.gitSyncBranch
    value: main
  - key: config.gitSyncPeriod
    value: 60s
  # Auth for private repos (optional):
  # - key: config.gitSyncAuthSecretName
  #   value: git-sync-auth          # K8s secret with keys: username + password (HTTPS) or ssh (SSH)
  # - key: config.gitSyncAuthType
  #   value: https                  # 'https' or 'ssh'
  - key: config.httpRouteEnabled
    value: "true"
  - key: config.gatewayName
    value: movie-scripts2-gateway
  - key: config.gatewayNamespace
    value: default
  - key: config.hostname
    value: clusterscope
  - key: config.domain
    value: movie-scripts2.sthings-vsphere.labul.sva.de
