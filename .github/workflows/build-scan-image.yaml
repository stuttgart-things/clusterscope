---
name: Build, Push & Scan Container Image
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push Image (Dagger)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build metadata
        id: meta
        run: |
          echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build & push commit tag
        uses: dagger/dagger-for-github@v6
        with:
          verb: call
          module: github.com/stuttgart-things/blueprints/kubernetes-microservice@v1.71.0
          args: >-
            bake-image
            --src .
            --repository-name ${{ github.repository }}
            --tag ${{ steps.meta.outputs.commit }}
            --registry-url ghcr.io
            --registry-username ${{ github.actor }}
            --registry-password env:GITHUB_TOKEN
            --dockerfile Dockerfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Build & push latest tag
        uses: dagger/dagger-for-github@v6
        with:
          verb: call
          module: github.com/stuttgart-things/blueprints/kubernetes-microservice@v1.71.0
          args: >-
            bake-image
            --src .
            --repository-name ${{ github.repository }}
            --tag latest
            --registry-url ghcr.io
            --registry-username ${{ github.actor }}
            --registry-password env:GITHUB_TOKEN
            --dockerfile Dockerfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
